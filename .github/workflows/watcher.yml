name: BoardDocs Watcher

on:
  schedule:
    # Every 2 hours at :23. GitHub drops or delays top-of-the-hour crons by
    # hours (observed: the 11:00 slot fired at 14:53, and Sunday slots were
    # skipped entirely), so run off-hour and often — a skipped slot then only
    # costs 2 hours of latency instead of a day. Each run is ~30s and commits
    # only when the district actually published something.
    - cron: "23 */2 * * *"
  workflow_dispatch: {}     # allows manual "Run workflow" button on GitHub

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run watcher
        run: python watcher/watch_boarddocs.py

      - name: Commit new documents
        run: |
          git config user.name "boarddocs-watcher"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new documents."
          else
            git commit -m "watcher: new documents $(date -u +%Y-%m-%d)"
            git push
          fi
