<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hewlett-Woodmere Treasurer's Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  :root{
    --navy:#12284c; --navy2:#1c3a6e; --accent:#c8a24b; --bg:#f4f6f9;
    --card:#fff; --ink:#1f2733; --muted:#6b7683; --line:#e3e8ef;
    --high:#c0392b; --med:#e08a1e; --low:#5a7d9a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink)}
  header{background:linear-gradient(120deg,var(--navy),var(--navy2));color:#fff;
         padding:20px 28px}
  header h1{margin:0;font-size:20px;font-weight:650;letter-spacing:.2px}
  header .sub{opacity:.8;font-size:13px;margin-top:4px}
  .wrap{max-width:1240px;margin:0 auto;padding:20px 24px 60px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
        gap:14px;margin:18px 0 8px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;
       padding:16px 18px;box-shadow:0 1px 2px rgba(16,32,64,.04)}
  .kpi .label{font-size:12px;color:var(--muted);text-transform:uppercase;
              letter-spacing:.6px}
  .kpi .val{font-size:26px;font-weight:680;margin-top:6px}
  .kpi .foot{font-size:12px;color:var(--muted);margin-top:4px}
  .tabs{display:flex;gap:6px;margin:22px 0 14px;border-bottom:2px solid var(--line)}
  .tab{padding:10px 18px;cursor:pointer;font-weight:600;color:var(--muted);
       border-bottom:2px solid transparent;margin-bottom:-2px}
  .tab.active{color:var(--navy);border-color:var(--accent)}
  .panel{display:none}.panel.active{display:block}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
        padding:14px 16px 6px;box-shadow:0 1px 2px rgba(16,32,64,.04);margin-bottom:18px}
  .card h3{margin:2px 4px 8px;font-size:14px;font-weight:650}
  .chart{width:100%;height:340px}
  .chart.tall{height:420px}
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
  select,input[type=text]{padding:8px 10px;border:1px solid var(--line);
       border-radius:8px;font-size:13px;background:#fff;color:var(--ink)}
  input[type=text]{min-width:220px}
  table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;
        border:1px solid var(--line);border-radius:10px;overflow:hidden}
  th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--line);
        vertical-align:top}
  th{background:#eef2f7;cursor:pointer;user-select:none;white-space:nowrap;
     font-weight:650;position:sticky;top:0}
  th:hover{background:#e5ebf3}
  tbody tr:hover{background:#f8fafc}
  td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .pos{color:#1a7f4b}.neg{color:#c0392b}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;
        font-weight:700;color:#fff}
  .pill.high{background:var(--high)}.pill.med{background:var(--med)}.pill.low{background:var(--low)}
  .count{color:var(--muted);font-size:13px;margin-left:auto}
  .detail{color:var(--muted);max-width:520px}
  .footnote{color:var(--muted);font-size:12px;margin-top:26px;line-height:1.6}
  .bar-row{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:13px}
  .bar-row .nm{width:230px;color:var(--ink)}
  .bar-row .track{flex:1;background:#eef2f7;border-radius:6px;height:16px;overflow:hidden}
  .bar-row .fill{height:100%;background:var(--navy2)}
  .bar-row .n{width:34px;text-align:right;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>Hewlett-Woodmere UFSD &middot; Treasurer's Report Dashboard</h1>
  <div class="sub" id="hsub"></div>
</header>
<div class="wrap">
  <div class="kpis" id="kpis"></div>
  <div class="tabs">
    <div class="tab active" data-tab="overview">Overview</div>
    <div class="tab" data-tab="exceptions">Exceptions</div>
  </div>

  <div class="panel active" id="overview">
    <div class="grid2">
      <div class="card"><h3>Fund balances over time</h3><div id="c_funds" class="chart"></div></div>
      <div class="card"><h3>Cash vs. investments</h3><div id="c_cashinv" class="chart"></div></div>
    </div>
    <div class="card"><h3>Interest earned per bank per month</h3><div id="c_interest" class="chart tall"></div></div>
    <div class="card"><h3>Collateral coverage % by depository (with required floors)</h3><div id="c_coll" class="chart tall"></div></div>
  </div>

  <div class="panel" id="exceptions">
    <div class="card">
      <h3>Exceptions by category</h3>
      <div id="checkbars"></div>
    </div>
    <div class="controls">
      <select id="fsev"><option value="">All severities</option>
        <option value="high">High</option><option value="med">Medium</option><option value="low">Low</option></select>
      <select id="fcheck"><option value="">All checks</option></select>
      <select id="fmonth"><option value="">All months</option></select>
      <input type="text" id="fsearch" placeholder="Search account, bank, GL, detail…">
      <span class="count" id="ecount"></span>
    </div>
    <div style="max-height:620px;overflow:auto;border-radius:10px">
    <table id="etable">
      <thead><tr>
        <th data-k="month">Month</th><th data-k="sev">Sev</th><th data-k="check">Check</th>
        <th data-k="account">Account</th><th data-k="bank">Bank</th><th data-k="gl">GL</th>
        <th data-k="expected" class="num">Expected</th><th data-k="actual" class="num">Actual</th>
        <th data-k="delta" class="num">Delta</th><th data-k="detail">Detail</th>
      </tr></thead>
      <tbody></tbody>
    </table>
    </div>
  </div>

  <div class="footnote" id="foot"></div>
</div>

const P = {responsive:true, displModeBar:false};
const LAY = m => Object.assign({
  margin:{l:52,r:16,t:10,b:70}, paper_bgcolor:'#fff', plot_bgcolor:'#fff',
  font:{family:'Segoe UI,Roboto,Arial', size:11, color:'#1f2733'},
  legend:{orientation:'h', y:-0.22, font:{size:10}}, hovermode:'x unified',
  xaxis:{tickangle:-45, automargin:true}, yaxis:{gridcolor:'#eef2f7'}
}, m||{});
const money = v => v==null? '' : (v<0?'-$':'$')+Math.abs(v).toLocaleString('en-US',{maximumFractionDigits:0});
const shortM = l => l.replace(' 20'," '");

// ---- KPIs ----
(function(){
  const k = DATA.kpis;
  document.getElementById('hsub').textContent =
     DATA.span + '  ·  ' + DATA.n_months + ' months  ·  as of ' + DATA.as_of;
  const cards = [
    ['Total assets ('+DATA.as_of+')', money(k.total_assets),
       k.assets_delta==null?'':(k.assets_delta>=0?'▲ ':'▼ ')+money(Math.abs(k.assets_delta))+' vs prior month'],
    ['Accounts tracked', k.n_accounts, DATA.n_months+' months in master'],
    ['Depositories', k.n_banks, 'active this month'],
    ['Exceptions flagged', k.n_exceptions, k.n_high+' high severity'],
  ];
  document.getElementById('kpis').innerHTML = cards.map(c=>
    `<div class="kpi"><div class="label">${c[0]}</div><div class="val">${c[1]}</div><div class="foot">${c[2]||''}</div></div>`).join('');
})();

// ---- charts ----
function drawFunds(){
  const t = DATA.funds.map(s=>({x:DATA.labels.map(shortM), y:s.values, name:s.name,
     type:'scatter', mode:'lines', stackgroup:'one', hovertemplate:'%{y:$,.0f}<extra>'+s.name+'</extra>'}));
  Plotly.newPlot('c_funds', t, LAY({yaxis:{tickformat:'$,.0s',gridcolor:'#eef2f7'}}), P);
}
function drawCashInv(){
  const mk = (n,c)=>({x:DATA.labels.map(shortM), y:DATA.cashinv[n], name:n, type:'scatter',
     mode:'lines', stackgroup:'one', line:{color:c}, fillcolor:c,
     hovertemplate:'%{y:$,.0f}<extra>'+n+'</extra>'});
  Plotly.newPlot('c_cashinv', [mk('Cash','#4c72b0'), mk('Investments','#dd8452')],
     LAY({yaxis:{tickformat:'$,.0s',gridcolor:'#eef2f7'}}), P);
}
function drawInterest(){
  const t = DATA.interest.map(s=>({x:DATA.labels.map(shortM), y:s.values, name:s.name,
     type:'bar', hovertemplate:'%{y:$,.0f}<extra>'+s.name+'</extra>'}));
  Plotly.newPlot('c_interest', t, LAY({barmode:'group',
     yaxis:{tickformat:'$,.0s',gridcolor:'#eef2f7'}}), P);
}
function drawColl(){
  const t = DATA.collateral.map(s=>({x:DATA.labels.map(shortM), y:s.values, name:s.name,
     type:'scatter', mode:'lines+markers', connectgaps:false,
     hovertemplate:'%{y:.2f}%<extra>'+s.name+'</extra>'}));
  const shapes = DATA.floors.map(f=>({type:'line', xref:'paper', x0:0, x1:1, y0:f, y1:f,
     line:{color:'#c0392b', width:1, dash:'dot'}}));
  const ann = DATA.floors.map(f=>({xref:'paper', x:1, y:f, text:f.toFixed(0)+'% floor',
     showarrow:false, font:{color:'#c0392b', size:10}, xanchor:'right', yanchor:'bottom'}));
  Plotly.newPlot('c_coll', t, LAY({shapes:shapes, annotations:ann,
     yaxis:{ticksuffix:'%', gridcolor:'#eef2f7'}}), P);
}
drawFunds(); drawCashInv(); drawInterest(); drawColl();

// ---- exceptions table ----
const SEVLBL={high:'High',med:'Med',low:'Low'};
let sortK='month', sortDir=1;
const tbody = document.querySelector('#etable tbody');

// populate filters
(function(){
  const checks=[...new Set(DATA.exceptions.map(e=>e.check))].sort();
  const months=[...new Set(DATA.exceptions.map(e=>e.month))]
     .sort((a,b)=>{const A=DATA.exceptions.find(e=>e.month==a).sort_key,
                         B=DATA.exceptions.find(e=>e.month==b).sort_key; return A<B?-1:1;});
  const fc=document.getElementById('fcheck'); checks.forEach(c=>fc.add(new Option(c,c)));
  const fm=document.getElementById('fmonth'); months.forEach(m=>fm.add(new Option(m,m)));
  // category bars
  const cc=DATA.check_counts, max=Math.max(...Object.values(cc),1);
  document.getElementById('checkbars').innerHTML = Object.entries(cc).map(([k,v])=>
    `<div class="bar-row"><div class="nm" title="${k}">${k}</div>
     <div class="track"><div class="fill" style="width:${100*v/max}%"></div></div>
     <div class="n">${v}</div></div>`).join('');
})();

function filtered(){
  const sev=fsev.value, ch=fcheck.value, mo=fmonth.value, q=fsearch.value.toLowerCase();
  return DATA.exceptions.filter(e=>
    (!sev||e.sev==sev)&&(!ch||e.check==ch)&&(!mo||e.month==mo)&&
    (!q||[e.account,e.bank,e.gl,e.detail,e.check].join(' ').toLowerCase().includes(q)));
}
function render(){
  let rows=filtered();
  rows.sort((a,b)=>{
    let x=a[sortK], y=b[sortK];
    if(sortK=='month'){x=a.sort_key;y=b.sort_key;}
    if(x==null)x=-Infinity; if(y==null)y=-Infinity;
    return (x<y?-1:x>y?1:0)*sortDir;
  });
  tbody.innerHTML = rows.map(e=>{
    const d=e.delta;
    const dcls = d==null?'':(d<0?'neg':'pos');
    return `<tr>
      <td>${shortM(e.month)}</td>
      <td><span class="pill ${e.sev}">${SEVLBL[e.sev]}</span></td>
      <td>${e.check}</td>
      <td>${e.account||''}</td><td>${e.bank||''}</td><td>${e.gl||''}</td>
      <td class="num">${e.expected==null?'':money(e.expected)}</td>
      <td class="num">${e.actual==null?'':money(e.actual)}</td>
      <td class="num ${dcls}">${d==null?'':money(d)}</td>
      <td class="detail">${e.detail||''}</td></tr>`;
  }).join('');
  document.getElementById('ecount').textContent = rows.length+' of '+DATA.exceptions.length+' exceptions';
}
['fsev','fcheck','fmonth'].forEach(id=>document.getElementById(id).onchange=render);
document.getElementById('fsearch').oninput=render;
document.querySelectorAll('#etable th').forEach(th=>th.onclick=()=>{
  const k=th.dataset.k; if(k==sortK)sortDir*=-1; else{sortK=k;sortDir=1;} render();
});
render();

// ---- tabs ----
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById(t.dataset.tab).classList.add('active');
  window.dispatchEvent(new Event('resize'));
});

document.getElementById('foot').innerHTML =
  'Generated by the Treasurer\'s Report pipeline · data as of '+DATA.as_of+
  '. Dashboard regenerates each run; charts are interactive (hover, zoom, toggle series in the legend). '+
  'Collateral 0%% points (FDIC-insured small balances) are hidden. First Nat\'l / Connect One are shown as one institution.';
</script>
</body>
</html>
